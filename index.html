<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hossain Tea | Premium Tea Supply</title>
    <link rel="icon" type="image/webp" href="img/logo.webp">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
    
    <style>
        :root {
            --tea-green: #1b4332;
            --accent-gold: #d4af37;
            --soft-cream: #fdfaf5;
            --dark-leaf: #081c15;
        }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: var(--soft-cream); 
            color: var(--dark-leaf);
            overflow-x: hidden;
        }

        h1, h2, h3, .navbar-brand { font-family: 'Playfair Display', serif; }

        .navbar {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 5px 0;
            min-height: 70px;
        }

        .brand-logo {
            height: 50px;
            width: auto;
            object-fit: contain;
            display: block;
        }

        .hero-banner {
            background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('img/banner.webp');
            background-size: cover;
            background-position: center center;
            height: 80vh;
            width: 100%;
        }

        @media screen and (max-width: 767px) {
            .hero-banner {
                background-image: linear-gradient(rgba(0,0,0,0.1), rgba(0,0,0,0.1)), url('img/banner2.webp') !important;
                height: 50vh;
            }
        }

        .tea-card { 
            border: none; 
            border-radius: 24px; 
            background: #ffffff;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1); 
            overflow: hidden;
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
            cursor: pointer;
        }

        .tea-card:hover { 
            transform: translateY(-15px); 
            box-shadow: 0 30px 60px rgba(27, 67, 50, 0.12) !important; 
        }

        .img-container { height: 280px; overflow: hidden; position: relative; }
        .tea-card img { transition: transform 0.8s; object-fit: cover; }
        .tea-card:hover img { transform: scale(1.1); }

        .price-tag { font-size: 1.4rem; color: var(--tea-green); font-weight: 700; }

        .btn-view {
            background: var(--tea-green);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 10px 20px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn-view:hover { background: var(--dark-leaf); color: white; transform: scale(1.05); }

        .category-header { 
            font-size: 2.2rem;
            margin-bottom: 40px;
            position: relative;
            padding-bottom: 15px;
        }
        .category-header::after {
            content: "";
            position: absolute;
            bottom: 0; left: 0;
            width: 60px; height: 4px;
            background: var(--accent-gold);
        }

        footer { 
            background: var(--dark-leaf); 
            color: #d1d1d1; 
            padding: 60px 0 30px; 
            border-top-left-radius: 40px;
            border-top-right-radius: 40px;
            margin-top: 50px;
        }
        .social-circle {
            width: 40px; height: 40px;
            background: rgba(255,255,255,0.05);
            display: inline-flex;
            align-items: center; justify-content: center;
            border-radius: 50%; margin-right: 10px;
            color: white; text-decoration: none; transition: 0.3s;
        }
        .social-circle:hover { background: var(--accent-gold); color: var(--dark-leaf); }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container d-flex align-items-center justify-content-between">
        <a class="navbar-brand p-0" href="index.html">
            <img src="img/logo.webp" alt="Hossain Tea Logo" class="brand-logo">
        </a>
        <div class="d-flex align-items-center">
            <a href="cart.html" class="nav-link position-relative me-3">
                <i class="fas fa-shopping-cart fs-4 text-success"></i>
                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </a>
            <div class="d-none d-lg-block text-muted small">
                <i class="fas fa-truck me-2"></i> Fast Delivery to <strong>Rajgonj Bazar, Cumilla</strong>
            </div>
        </div>
    </div>
</nav>

<div class="hero-banner"></div>

<div class="container py-5" id="shop">
    <h2 class="category-header" data-aos="fade-up">Signature Black</h2>
    <div class="row mb-5" id="black-tea-list" data-aos="fade-up"></div>

    <h2 class="category-header" data-aos="fade-up">Pure Green</h2>
    <div class="row mb-5" id="green-tea-list" data-aos="fade-up"></div>
</div>

<footer>
    <div class="container">
        <div class="row g-5">
            <div class="col-md-6">
                <img src="img/logo.webp" alt="Hossain Tea" style="height: 50px; margin-bottom: 20px;">
                <p class="mb-4 pe-lg-5">Sourcing premium leaves from the best gardens to Rajgonj Bazar, Cumilla.</p>
                <div class="social-icons">
                    <a href="https://www.facebook.com/Hossainteasupply/" class="social-circle"><i class="fab fa-facebook-f"></i></a>
                    <a href="https://wa.me/8801711829628" class="social-circle"><i class="fab fa-whatsapp"></i></a>
                </div>
            </div>
            <div class="col-md-6">
                <h5 class="text-white mb-4">Contact Info</h5>
                <p class="mb-2"><i class="fas fa-location-dot me-3 text-warning"></i> Rajgonj Bazar, Cumilla, BD</p>
                <p class="mb-2"><i class="fas fa-phone-alt me-3 text-warning"></i> +880 1711-829628</p>
            </div>
        </div>
        <div class="text-center mt-5 pt-4 border-top border-secondary small opacity-50">
            © 2026 Hossain Tea.
        </div>
    </div>
</footer>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
<script>
    AOS.init({ duration: 1000, once: true });

    const products = [
        { id: 1, cat: 'Black', name: 'Special Clone Tea', price: 120, qty: '250g', img: 'img/ckpzxx37egcgt6w86pfq.webp' },
        { id: 2, cat: 'Black', name: 'Premium Bop Clone Tea', price: 150, qty: '250g', img: 'img/okxj1yw2zuo4ubd9fawf.webp' },
        { id: 3, cat: 'Black', name: 'Premium Of Clone Tea', price: 200, qty: '250g', img: 'img/besfkelxfjgcqm87vsxc.webp' },
        { id: 4, cat: 'Green', name: 'Zen Jasmine', price: 150, qty: '100g', img: 'img/fcbv8jl0evpbw8tfadin.webp' },
        { id: 5, cat: 'Green', name: 'Himalayan Pure', price: 250, qty: '100g', img: 'img/rdts5xshxwfahdgvm6mb.webp' },
        { id: 6, cat: 'Green', name: 'Jade Cloud', price: 300, qty: '100g', img: 'img/of1v2nxrqncddgqwtdbl.webp' }         
    ];

    $(document).ready(function() {
        updateCartCount();

        products.forEach(p => {
            const html = `
                <div class="col-md-6 col-lg-4 mb-5">
                    <div class="card tea-card h-100 shadow-sm">
                        <div class="img-container" onclick="goToDetails(${p.id})">
                            <img src="${p.img}" class="card-img-top h-100 w-100" alt="${p.name}">
                        </div>
                        <div class="card-body p-4">
                            <h4 class="fw-bold mb-1">${p.name}</h4>
                            <p class="text-muted small mb-3">${p.qty} Heritage Pack</p>
                            <div class="d-flex justify-content-between align-items-center">
                                <span class="price-tag">৳${p.price}</span>
                                <button class="btn btn-view" onclick="addToCart(${p.id})">Add to Cart</button>
                            </div>
                        </div>
                    </div>
                </div>`;
            if(p.cat === 'Black') $('#black-tea-list').append(html);
            else $('#green-tea-list').append(html);
        });
    });

    function addToCart(id) {
        let cart = JSON.parse(localStorage.getItem('teaCart')) || [];
        const product = products.find(x => x.id === id);
        const weight = product.cat === 'Green' ? '100g' : '250g';
        const cartId = product.id + '-' + weight;

        const existing = cart.find(item => item.cartId === cartId);
        if(existing) {
            existing.qty += 1;
            existing.itemTotal = existing.qty * existing.price;
        } else {
            cart.push({...product, cartId: cartId, qty: 1, weight: weight, itemTotal: product.price});
        }
        
        localStorage.setItem('teaCart', JSON.stringify(cart));
        updateCartCount();
        alert(product.name + " কার্টে যোগ করা হয়েছে!");
    }

    function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem('teaCart')) || [];
        $('#cart-count').text(cart.length);
    }

    function goToDetails(id) {
        const p = products.find(x => x.id === id);
        localStorage.setItem('selectedProduct', JSON.stringify(p));
        window.location.href = 'product.html';
    }
</script>
</body>
</html>
