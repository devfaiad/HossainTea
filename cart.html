<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | Hossain Tea</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --tea-green: #1b4332; --soft-cream: #fdfaf5; }
        body { background: var(--soft-cream); font-family: 'Inter', sans-serif; }
        .cart-item { background: white; border-radius: 15px; padding: 15px; margin-bottom: 15px; border: 1px solid #eee; }
        .btn-checkout { background: var(--tea-green); color: white; border-radius: 50px; padding: 12px; width: 100%; font-weight: bold; text-decoration: none; display: block; text-align: center; }
    </style>
</head>
<body>
<div class="container py-5">
    <h2 class="fw-bold mb-4"><i class="fas fa-shopping-basket me-2"></i> Your Shopping Cart</h2>
    <div class="row">
        <div class="col-lg-8" id="cart-items-container">
            </div>
        <div class="col-lg-4">
            <div class="card p-4 shadow-sm border-0" style="border-radius: 20px;">
                <h4>Summary</h4>
                <hr>
                <div class="d-flex justify-content-between mb-3">
                    <span>Total Items</span>
                    <span id="total-items">0</span>
                </div>
                <div class="d-flex justify-content-between mb-4">
                    <h5 class="fw-bold">Subtotal</h5>
                    <h5 class="fw-bold text-success">৳<span id="cart-subtotal">0</span></h5>
                </div>
                <a href="order.html" class="btn-checkout">Proceed to Order</a>
                <a href="index.html" class="d-block text-center mt-3 text-muted small text-decoration-none">Continue Shopping</a>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
    function loadCart() {
        let cart = JSON.parse(localStorage.getItem('teaCart')) || [];
        $('#cart-items-container').empty();
        let subtotal = 0;

        if(cart.length === 0) {
            $('#cart-items-container').html('<div class="text-center py-5"><h3>Your cart is empty!</h3><a href="index.html" class="btn btn-success mt-3">Shop Now</a></div>');
            return;
        }

        cart.forEach((item, index) => {
            let itemTotal = item.price * item.qty * (item.weight === '500g' ? 2 : 1);
            subtotal += itemTotal;
            
            $('#cart-items-container').append(`
                <div class="cart-item d-flex align-items-center justify-content-between shadow-sm">
                    <div class="d-flex align-items-center">
                        <img src="${item.img}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 10px;">
                        <div class="ms-3">
                            <h6 class="mb-0 fw-bold">${item.name}</h6>
                            <small class="text-muted">${item.weight} | Qty: ${item.qty}</small>
                        </div>
                    </div>
                    <div class="text-end">
                        <div class="fw-bold text-success mb-2">৳${itemTotal}</div>
                        <button class="btn btn-sm btn-outline-danger" onclick="removeItem(${index})"><i class="fas fa-trash"></i></button>
                    </div>
                </div>
            `);
        });

        $('#total-items').text(cart.length);
        $('#cart-subtotal').text(subtotal.toFixed(2));
    }

    function removeItem(index) {
        let cart = JSON.parse(localStorage.getItem('teaCart')) || [];
        cart.splice(index, 1);
        localStorage.setItem('teaCart', JSON.stringify(cart));
        loadCart();
    }

    $(document).ready(loadCart);
</script>
</body>
</html>
