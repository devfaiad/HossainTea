<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Details | Hossain Tea</title>
    <link rel="icon" type="image/webp" href="img/logo.webp">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --tea-green: #1b4332;
            --accent-gold: #d4af37;
            --soft-cream: #fdfaf5;
            --dark-leaf: #081c15;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--soft-cream); color: var(--dark-leaf); }
        h1, h4, .navbar-brand { font-family: 'Playfair Display', serif; }

        .navbar {
            backdrop-filter: blur(10px);
            background: rgba(255, 255, 255, 0.9);
            border-bottom: 1px solid rgba(0,0,0,0.05);
            padding: 5px 0;
        }

        .brand-logo { height: 50px; width: auto; object-fit: contain; }

        .product-image-holder { 
            border-radius: 30px; 
            overflow: hidden; 
            box-shadow: 0 20px 40px rgba(0,0,0,0.08); 
            background: white; 
        }

        .qty-box {
            display: flex;
            align-items: center;
            background: #fff;
            border: 2px solid var(--tea-green);
            border-radius: 50px;
            padding: 5px;
            width: fit-content;
        }
        .qty-btn {
            width: 50px; height: 50px;
            border-radius: 50%;
            border: none;
            background: var(--tea-green);
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.3s;
        }
        .qty-btn:hover { background: var(--dark-leaf); transform: scale(1.05); }
        .qty-input {
            width: 70px; font-size: 1.5rem; font-weight: 800;
            text-align: center; border: none; background: transparent; color: var(--tea-green);
        }

        .price-card {
            background: var(--dark-leaf);
            color: white;
            padding: 35px;
            border-radius: 30px;
            text-align: center;
            box-shadow: 0 15px 30px rgba(8, 28, 21, 0.2);
            margin-top: 30px;
        }
        .big-price { font-size: 3.5rem; font-weight: 900; color: var(--accent-gold); line-height: 1; }
        .total-label { text-transform: uppercase; letter-spacing: 2px; font-size: 0.8rem; opacity: 0.7; margin-bottom: 10px; }

        .btn-order {
            background: var(--accent-gold);
            color: var(--dark-leaf);
            border: none;
            font-weight: 800;
            text-transform: uppercase;
            padding: 18px;
            font-size: 1.1rem;
            transition: 0.3s;
            margin-top: 20px;
        }
        .btn-order:hover { background: #fff; transform: translateY(-3px); box-shadow: 0 10px 20px rgba(0,0,0,0.1); }

        footer { 
            background: var(--dark-leaf); color: #d1d1d1; padding: 60px 0 40px; 
            border-top-left-radius: 50px; border-top-right-radius: 50px; margin-top: 100px;
        }
        .footer-logo-img { height: 50px; margin-bottom: 15px; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top">
    <div class="container d-flex align-items-center justify-content-between">
        <a class="navbar-brand p-0" href="index.html">
            <img src="img/logo.webp" alt="Hossain Tea Logo" class="brand-logo">
        </a>
        <div class="d-flex align-items-center">
            <a href="cart.html" class="nav-link position-relative me-3 text-success">
                <i class="fas fa-shopping-cart fs-4"></i>
                <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger">0</span>
            </a>
        </div>
    </div>
</nav>

<div class="container py-5">
    <div class="row g-5 align-items-center">
        <div class="col-lg-6">
            <div class="product-image-holder">
                <img id="p-img" src="" class="img-fluid w-100" style="min-height: 500px; object-fit: cover;" alt="Premium Tea">
            </div>
        </div>

        <div class="col-lg-6">
            <h1 id="p-name" class="display-4 fw-bold mb-3"></h1>
            <p id="p-desc" class="lead text-muted mb-5"></p>

            <div class="row g-4 mb-5">
                <div class="col-md-6">
                    <label class="form-label fw-bold small text-uppercase opacity-75 mb-3">Pack Size</label>
                    <select id="weight-select" class="form-select form-select-lg rounded-pill border-2" style="border-color: var(--tea-green); height: 55px;">
                        <option value="250">Standard (250g)</option>
                        <option value="500">Family Pack (500g)</option>
                    </select>
                </div>

                <div class="col-md-6">
                    <label class="form-label fw-bold small text-uppercase opacity-75 mb-3">Quantity</label>
                    <div class="qty-box">
                        <button class="qty-btn" id="btn-minus"><i class="fas fa-minus"></i></button>
                        <input type="text" id="qty-count" class="qty-input" value="1" readonly>
                        <button class="qty-btn" id="btn-plus"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>

            <div class="price-card">
                <div class="total-label">Subtotal for this Item</div>
                <div class="big-price mb-4">৳<span id="display-total">0</span></div>
                <button id="add-to-cart-btn" class="btn btn-order btn-lg w-100 rounded-pill shadow-lg">
                    <i class="fas fa-cart-plus me-2"></i> Add to Cart & Checkout
                </button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
   $(document).ready(function() {
    const product = JSON.parse(localStorage.getItem('selectedProduct'));
    if(!product) { window.location.href = 'index.html'; return; }

    $('#p-name').text(product.name);
    $('#p-img').attr('src', product.img);

    // নিশ্চিত করা হচ্ছে প্রাইস যেন নম্বর হয়
    let basePrice = parseFloat(product.price) || 0; 
    let currentQty = 1;

    function updatePrice() {
        let weightMultiplier = ($('#weight-select').val() == "500") ? 2 : 1;
        let subtotal = (basePrice * weightMultiplier) * currentQty;
        
        // যদি সংখ্যা না হয় তবে ০ দেখাবে
        if (isNaN(subtotal)) subtotal = 0;
        $('#display-total').text(subtotal.toFixed(2));
    }

    updatePrice();

    $('#weight-select').on('change', updatePrice);
    $('#btn-plus').on('click', function() { currentQty++; $('#qty-count').val(currentQty); updatePrice(); });
    $('#btn-minus').on('click', function() { if(currentQty > 1) { currentQty--; $('#qty-count').val(currentQty); updatePrice(); } });

    $('#add-to-cart-btn').on('click', function() {
        let cart = JSON.parse(localStorage.getItem('teaCart')) || [];
        let finalPrice = parseFloat($('#display-total').text());

        let cartItem = {
            id: product.id + '-' + $('#weight-select').val(),
            name: product.name,
            img: product.img,
            price: basePrice,
            weight: $('#weight-select').val() + 'g',
            qty: currentQty,
            itemTotal: finalPrice // এখানে নিশ্চিত নম্বর যাচ্ছে
        };

        let existingIdx = cart.findIndex(item => item.id === cartItem.id);
        if(existingIdx > -1) {
            cart[existingIdx].qty += currentQty;
            cart[existingIdx].itemTotal += finalPrice;
        } else {
            cart.push(cartItem);
        }

        localStorage.setItem('teaCart', JSON.stringify(cart));
        window.location.href = 'cart.html';
    });
});
</script>
</body>
</html>
