<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>প্রোডাক্টের বিবরণ | হোসাইন টি</title>
    <link rel="icon" type="image/webp" href="img/logo.webp">
    
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600&family=Playfair+Display:wght@700;800&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-green: #112A20;
            --accent-gold: #CBA35C;
            --light-cream: #F9F6F0;
            --white: #FFFFFF;
        }
        body { font-family: 'Poppins', sans-serif; background-color: var(--light-cream); color: #2c3e50; }
        h1, .navbar-brand { font-family: 'Playfair Display', serif; color: var(--primary-green); }
        .navbar { backdrop-filter: blur(10px); background: rgba(255, 255, 255, 0.9); border-bottom: 1px solid rgba(0,0,0,0.05); }
        .brand-logo { height: 50px; }
        .product-image-holder { border-radius: 20px; overflow: hidden; box-shadow: 0 20px 40px rgba(17, 42, 32, 0.1); background: white; }
        #p-desc { line-height: 1.8; font-size: 1.1rem; text-align: justify; color: #444; }
        .qty-box { display: flex; align-items: center; background: white; border: 2px solid var(--primary-green); border-radius: 50px; padding: 5px; width: fit-content; }
        .qty-btn { width: 45px; height: 45px; border-radius: 50%; border: none; background: var(--primary-green); color: white; transition: 0.3s; }
        .qty-btn:hover { background: var(--accent-gold); }
        .qty-input { width: 60px; text-align: center; border: none; font-weight: 700; font-size: 1.2rem; background: transparent; }
        .price-card { background: var(--primary-green); color: white; padding: 30px; border-radius: 25px; text-align: center; margin-top: 30px; }
        .big-price { font-size: 3.5rem; font-weight: 800; color: var(--accent-gold); font-family: 'Playfair Display'; }
        .btn-order { background: var(--accent-gold); color: var(--primary-green); border: none; font-weight: 700; padding: 18px; border-radius: 50px; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .btn-order:hover { background: white; transform: translateY(-3px); }
    </style>
</head>
<body>

<nav class="navbar sticky-top">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand" href="index.html"><img src="img/logo.webp" alt="Logo" class="brand-logo"></a>
        <a href="cart.html" class="position-relative text-success fs-4">
            <i class="fas fa-shopping-bag"></i>
            <span id="cart-count" class="position-absolute top-0 start-100 translate-middle badge rounded-pill bg-danger" style="font-size: 0.6rem;">0</span>
        </a>
    </div>
</nav>

<div class="container py-5">
    <div class="row g-5 align-items-center">
        <div class="col-lg-6">
            <div class="product-image-holder"><img id="p-img" src="" class="img-fluid w-100" style="min-height: 500px; object-fit: cover;"></div>
        </div>
        <div class="col-lg-6">
            <h1 id="p-name" class="display-5 fw-bold mb-3"></h1>
            <p id="p-desc" class="mb-5"></p>
            <div class="row g-4 mb-4">
                <div class="col-md-6">
                    <label class="fw-bold small text-uppercase mb-2 d-block">প্যাক সাইজ (Pack Size)</label>
                    <select id="weight-select" class="form-select form-select-lg rounded-pill border-2"></select>
                </div>
                <div class="col-md-6">
                    <label class="fw-bold small text-uppercase mb-2 d-block">পরিমাণ (Quantity)</label>
                    <div class="qty-box">
                        <button class="qty-btn" id="btn-minus"><i class="fas fa-minus"></i></button>
                        <input type="text" id="qty-count" class="qty-input" value="1" readonly>
                        <button class="qty-btn" id="btn-plus"><i class="fas fa-plus"></i></button>
                    </div>
                </div>
            </div>
            <div class="price-card shadow-lg">
                <div class="small text-uppercase opacity-75">মোট মূল্য (Subtotal)</div>
                <div class="big-price">৳<span id="display-total">0</span></div>
                <button id="add-to-cart-btn" class="btn btn-order shadow-lg mt-3"><i class="fas fa-cart-plus me-2"></i> Add to Cart</button>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script>
$(document).ready(function() {
    const product = JSON.parse(localStorage.getItem('selectedProduct'));
    if(!product) { window.location.href = 'index.html'; return; }

    $('#p-name').text(product.name);
    $('#p-img').attr('src', product.img);

    // ডাইনামিক ওজন অপশন
    const weightSelect = $('#weight-select');
    weightSelect.empty();
    if(product.cat === 'Green') {
        weightSelect.append('<option value="100">Standard (100g)</option><option value="250">Premium (250g)</option>');
    } else {
        weightSelect.append('<option value="250">Standard (250g)</option><option value="500">Family Pack (500g)</option>');
    }

    const descriptions = {
        1: "আমাদের **Special Clone Tea** বিশেষ পদ্ধতিতে ক্লোন করা উন্নত জাতের চা পাতা থেকে তৈরি। এটি কড়া লিকার এবং সুন্দর ঘ্রাণের জন্য সেরা।",
        2: "হোসাইন টি প্রিমিয়াম বিওপি ব্ল্যাক টি বাংলাদেশের সেরা বাগান থেকে সংগৃহীত। এটি আপনার চায়ের তৃষ্ণা মেটাতে এবং আভিজাত্য এনে দিতে অনন্য।",
        3: "প্রিমিয়াম ও এফ ব্ল্যাক টি-তে থাকে কড়া লিকার ও মনমাতানো ঘ্রাণ, যা আপনার দিনটিকে করবে সতেজ।",
        4: "**Zen Jasmine Green Tea** আপনাকে দেবে জেসমিনের সতেজ সুবাস। এটি ক্লান্তি দূর করতে দারুণ কার্যকর।",
        5: "**Himalayan Pure Green Tea** অ্যান্টি-অক্সিডেন্টে ভরপুর, যা শরীর ডিটক্স করতে সাহায্য করে।",
        6: "**Jade Cloud** গ্রিন টির প্রতিটি চুমুকে পাবেন প্রাকৃতিক বিশুদ্ধ স্বাদ।"
    };

    let descHtml = descriptions[product.id] || "হোসাইন টি-এর বাছাইকৃত প্রিমিয়াম চা পাতা।";
    $('#p-desc').html(descHtml.replace(/\*\*(.*?)\*\*/g, '<strong>$1</strong>'));

    let basePrice = parseFloat(product.price) || 0; 
    let currentQty = 1;

    function updatePrice() {
        const weight = parseFloat(weightSelect.val());
        let multiplier = 1;
        if(product.cat === 'Green') multiplier = (weight === 250) ? 2.5 : 1;
        else multiplier = (weight === 500) ? 2 : 1;

        let total = (basePrice * multiplier) * currentQty;
        $('#display-total').text(total.toLocaleString('en-IN', {minimumFractionDigits: 2}));
    }

    updatePrice();
    updateCartCount();
    weightSelect.on('change', updatePrice);
    $('#btn-plus').on('click', () => { currentQty++; $('#qty-count').val(currentQty); updatePrice(); });
    $('#btn-minus').on('click', () => { if(currentQty > 1) { currentQty--; $('#qty-count').val(currentQty); updatePrice(); } });

    $('#add-to-cart-btn').on('click', function() {
        let cart = JSON.parse(localStorage.getItem('teaCart')) || [];
        const weight = weightSelect.val();
        const total = parseFloat($('#display-total').text().replace(/,/g, ''));
        const cartId = product.id + '-' + weight + 'g';

        let item = { cartId, ...product, weight: weight + 'g', qty: currentQty, itemTotal: total };
        let idx = cart.findIndex(x => x.cartId === cartId);
        if(idx > -1) { cart[idx].qty += currentQty; cart[idx].itemTotal += total; }
        else cart.push(item);

        localStorage.setItem('teaCart', JSON.stringify(cart));
        updateCartCount();
        window.location.href = 'cart.html';
    });

    function updateCartCount() {
        let cart = JSON.parse(localStorage.getItem('teaCart')) || [];
        $('#cart-count').text(cart.length);
    }
});
</script>
</body>
</html>
