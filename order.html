<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Checkout | Hossain Tea</title>
    <link rel="icon" type="image/webp" href="img/logo.webp">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/sweetalert2@11/dist/sweetalert2.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Playfair+Display:wght@700;900&display=swap" rel="stylesheet">
    
    <style>
        :root { --tea-green: #1b4332; --accent-gold: #d4af37; --soft-cream: #fdfaf5; --dark-leaf: #081c15; }
        body { font-family: 'Inter', sans-serif; background-color: var(--soft-cream); color: var(--dark-leaf); }
        .checkout-card { border: none; border-radius: 25px; box-shadow: 0 15px 40px rgba(0,0,0,0.05); background: #fff; }
        .summary-box { background: var(--soft-cream); border-radius: 20px; border: 2px solid #e9ecef; padding: 25px; }
        .brand-logo { height: 50px; width: auto; }
        .cart-item-row { border-bottom: 1px dashed #ddd; padding: 10px 0; font-size: 0.95rem; }
        .btn-confirm { background: var(--tea-green); color: white; border-radius: 50px; font-weight: 700; padding: 15px; border: none; width: 100%; transition: 0.3s; text-transform: uppercase; }
        .btn-confirm:hover { background: var(--dark-leaf); transform: translateY(-2px); color: white; }
    </style>
</head>
<body>

<nav class="navbar navbar-expand-lg sticky-top bg-white border-bottom py-2">
    <div class="container">
        <a class="navbar-brand" href="index.html">
            <img src="img/logo.webp" alt="Hossain Tea Logo" class="brand-logo">
        </a>
    </div>
</nav>

<div class="container py-5">
    <div class="row g-5 justify-content-center">
        <div class="col-lg-10">
            <div class="card checkout-card p-4 p-md-5">
                <div class="row g-5">
                    
                    <div class="col-md-5 order-md-2">
                        <h4 class="fw-bold mb-4">Order Summary</h4>
                        <div class="summary-box">
                            <div id="cart-list"></div>
                            <hr>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Subtotal</span>
                                <span id="display-subtotal" class="fw-bold">৳0.00</span>
                            </div>
                            <div class="d-flex justify-content-between mb-2">
                                <span>Shipping Fee</span>
                                <span id="display-shipping" class="text-danger fw-bold">৳0.00</span>
                            </div>
                            <div class="d-flex justify-content-between mt-3 pt-3 border-top">
                                <h5 class="fw-bold">Grand Total</h5>
                                <h5 class="fw-bold text-success" id="display-grand-total">৳0.00</h5>
                            </div>
                        </div>
                    </div>

                    <div class="col-md-7 order-md-1">
                        <h2 class="fw-bold mb-4">Shipping Details</h2>
                        <form id="orderForm">
                            <input type="hidden" name="Product_Name" id="hidden-p-name">
                            <input type="hidden" name="Total_Price" id="hidden-p-total">

                            <div class="mb-3">
                                <label class="form-label fw-bold small">FULL NAME</label>
                                <input type="text" name="Customer_Name" class="form-control" placeholder="আপনার নাম" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">PHONE NUMBER</label>
                                <input type="tel" name="Customer_Phone" class="form-control" placeholder="01XXXXXXXXX" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold small">LOCATION</label>
                                <select id="location-select" name="Shipping_Location" class="form-select" required>
                                    <option value="" selected disabled>সিলেক্ট করুন</option>
                                    <option value="Inside Cumilla">Inside Cumilla (৳50)</option>
                                    <option value="Outside Cumilla">Outside Cumilla (৳150)</option>
                                </select>
                            </div>
                            <div class="mb-4">
                                <label class="form-label fw-bold small">FULL ADDRESS</label>
                                <textarea name="Customer_Address" class="form-control" rows="3" placeholder="বিস্তারিত ঠিকানা লিখুন" required></textarea>
                            </div>

                            <button type="submit" id="submitBtn" class="btn btn-confirm">Confirm Order</button>
                        </form>
                    </div>

                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<script>
$(document).ready(function() {
    let cart = JSON.parse(localStorage.getItem('teaCart')) || [];
    if(cart.length === 0) { window.location.href = 'index.html'; return; }

    let cartSubtotal = 0;
    let pNames = [];

    cart.forEach(item => {
        let itemTotal = parseFloat(item.itemTotal) || 0;
        cartSubtotal += itemTotal;
        pNames.push(`${item.name} (${item.weight} x ${item.qty})`);
        $('#cart-list').append(`
            <div class="cart-item-row d-flex justify-content-between">
                <span>${item.name} (${item.weight} x ${item.qty})</span>
                <span class="fw-bold">৳${itemTotal.toFixed(2)}</span>
            </div>
        `);
    });

    function initDisplay() {
        $('#display-subtotal').text('৳' + cartSubtotal.toFixed(2));
        $('#display-shipping').text('৳0.00');
        $('#display-grand-total').text('৳' + cartSubtotal.toFixed(2));
        $('#hidden-p-name').val(pNames.join(", "));
        $('#hidden-p-total').val('৳' + cartSubtotal.toFixed(2));
    }
    initDisplay();

    $('#location-select').on('change', function() {
        const location = $(this).val();
        let shipping = (location === 'Inside Cumilla') ? 50 : 150;
        let grandTotal = cartSubtotal + shipping;
        $('#display-shipping').text('৳' + shipping.toFixed(2));
        $('#display-grand-total').text('৳' + grandTotal.toFixed(2));
        $('#hidden-p-total').val('৳' + grandTotal.toFixed(2));
    });

    // ৫. AJAX এর মাধ্যমে ফর্ম সাবমিট
    $('#orderForm').on('submit', function(e) {
        e.preventDefault(); // ডিফল্ট রিডাইরেক্ট বন্ধ করা

        $('#submitBtn').prop('disabled', true).html('<i class="fas fa-spinner fa-spin me-2"></i> Processing...');

        const scriptURL = 'https://script.google.com/macros/s/AKfycbxAyrETZEBk2jD-Vg5afG-2Obn_BauBlpowvzuDqLHqOdEzc7tG_d4i6rWtxW9QMzIL/exec';
        
        // ফর্ম ডাটা সেন্ড করা
        $.ajax({
            url: scriptURL,
            method: "POST",
            data: new FormData(this),
            processData: false,
            contentType: false,
            success: function(response) {
                // ১. কার্ট ক্লিয়ার করা
                localStorage.removeItem('teaCart');

                // ২. সাকসেস পপআপ দেখানো
                Swal.fire({
                    icon: 'success',
                    title: 'অর্ডার সফল হয়েছে!',
                    text: 'আমরা শীঘ্রই আপনার সাথে যোগাযোগ করবো।',
                    confirmButtonText: 'ঠিক আছে',
                    confirmButtonColor: '#1b4332',
                    allowOutsideClick: false
                }).then((result) => {
                    if (result.isConfirmed) {
                        window.location.href = 'index.html'; // হোমপেজে ফেরত পাঠানো
                    }
                });
            },
            error: function(err) {
                $('#submitBtn').prop('disabled', false).text('Confirm Order');
                Swal.fire({
                    icon: 'error',
                    title: 'দুঃখিত!',
                    text: 'অর্ডার সাবমিট করতে সমস্যা হয়েছে। আবার চেষ্টা করুন।',
                    confirmButtonColor: '#1b4332'
                });
            }
        });
    });
});
</script>
</body>
</html>
